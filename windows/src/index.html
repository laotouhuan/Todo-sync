<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <script src="Sortable.min.js"></script>
</head>
<body>
  <div class="glass-panel" id="app-panel">
    <!-- Header -->
    <header data-tauri-drag-region>
      <div class="header-left" data-tauri-drag-region>
        <span class="app-title" data-tauri-drag-region>Todo</span>
        <div class="status-indicator" id="sync-status"></div>
      </div>
      <div class="header-right">
        <button id="search-btn" class="icon-btn" title="搜索待办">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/>
          </svg>
        </button>
        <button id="manual-sync-btn" class="icon-btn" title="云同步">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
            <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" fill="currentColor"/>
          </svg>
        </button>
        <button id="stats-btn" class="icon-btn" title="统计">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
            <path d="M3 3V21H21V19H5V3H3ZM7 17H10V10H7V17ZM12 17H15V6H12V17ZM17 17H20V13H17V17Z" fill="currentColor"/>
          </svg>
        </button>
        <button id="settings-btn" class="icon-btn" title="设置">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
            <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22l-1.92 3.32c-.12.21-.07.47.12.61l2.03 1.58c-.05.3-.09.62-.09.94s.04.64.09.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .43-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.03-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" fill="currentColor"/>
          </svg>
        </button>
        <button id="pin-btn" class="icon-btn" title="固定置顶">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
            <path d="M16 12V4H17V2H7V4H8V12L6 14V16H11.2V22H12.8V16H18V14L16 12Z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Date Filter tabs -->
    <div class="tabs-container">
      <button class="tab-btn active" id="tab-today">今天聚焦</button>
      <button class="tab-btn" id="tab-all">全部待办</button>
    </div>

    <!-- Search Bar -->
    <div class="search-bar-container" id="search-bar" style="display: none;">
      <div class="search-input-wrapper">
        <input type="text" id="search-input" placeholder="🔍 搜索待办任务名称..." />
        <span id="clear-search-btn" class="clear-search-btn" style="display: none;">&times;</span>
      </div>
    </div>

    <!-- Sub Tabs for All Todos -->
    <div class="sub-tabs-container" id="all-sub-tabs" style="display: none;">
      <button class="sub-tab-btn active" id="sub-tab-uncompleted">待完成</button>
      <button class="sub-tab-btn" id="sub-tab-completed">已完成</button>
    </div>



    <!-- Todo List & Matrix -->
    <main id="main-content" class="list-view">
      <ul id="todo-list">
        <!-- Rendered via JS -->
      </ul>
    </main>

    <!-- Stats Container -->
    <div id="stats-container" class="hidden">
      <div class="stats-header">
        <div class="tabs-container stats-period-tabs">
          <button class="tab-btn active" id="stats-period-day" data-period="day">日</button>
          <button class="tab-btn" id="stats-period-week" data-period="week">周</button>
          <button class="tab-btn" id="stats-period-month" data-period="month">月</button>
        </div>
        <div class="stats-date-nav">
          <button id="stats-prev-btn" class="icon-btn-small">
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <span id="stats-date-label">2026年 第22周</span>
          <button id="stats-next-btn" class="icon-btn-small">
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <div class="stats-filter-container">
          <button class="pill-btn stats-filter-btn active" data-filter="all">全部</button>
          <button class="pill-btn stats-filter-btn" data-filter="completed">已完成</button>
          <button class="pill-btn stats-filter-btn" data-filter="uncompleted">待完成</button>
        </div>
      </div>
      <div class="stats-summary-bar">
        <div class="stats-summary-text" id="stats-summary-text">共 0 项任务，已完成 0 项，进度 0%</div>
        <div class="stats-progress-track">
          <div class="stats-progress-fill" id="stats-progress-fill" style="width: 0%;"></div>
        </div>
      </div>
      <ul id="stats-list"></ul>
    </div>

    <!-- Add Input -->
    <footer id="app-footer">
      <form id="add-form">
        <input type="text" id="todo-input" placeholder="添加新待办..." autocomplete="off" />
        <button type="submit" class="add-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </form>
    </footer>
  </div>

  <!-- Edit Modal -->
  <div id="edit-modal" class="modal-overlay">
    <div class="modal-content glass-panel">
      <div style="position: relative; display: flex; justify-content: center; align-items: center; margin-bottom: 24px;">
        <button type="button" id="modal-back-btn" class="modal-back-btn" style="position: absolute; left: 0;">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          <span>返回</span>
        </button>
        <h3 style="margin: 0; font-size: 1.15rem; font-weight: 600;">编辑待办</h3>
      </div>
      <div class="modal-body">
        <label for="edit-content">待办内容</label>
        <input type="text" id="edit-content" placeholder="输入待办内容..." autocomplete="off" />
        
        <!-- 任务类型 (四种) -->
        <div class="input-group" style="margin-bottom: 12px; margin-top: 12px;">
          <label for="edit-task-type">任务类型</label>
          <select id="edit-task-type" class="custom-select">
            <option value="normal">普通任务</option>
            <option value="daily_repeat">每天重复</option>
            <option value="weekly_checkin">周打卡</option>
            <option value="monthly_checkin">月打卡</option>
          </select>
        </div>
        
        <!-- 截止日期与时间行 (仅普通任务显示) -->
        <div class="date-time-row" id="edit-date-time-row" style="margin-bottom: 12px;">
          <div class="input-group" style="flex: 2;">
            <label for="edit-date">截止日期</label>
            <div style="display: flex; gap: 8px; align-items: center;">
              <input type="date" id="edit-date" style="flex: 1;" />
              <button type="button" id="edit-date-type-btn" class="icon-btn-small" style="padding: 8px 12px; font-size: 0.8rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: var(--text-secondary); cursor: pointer; white-space: nowrap; height: 38px;">文本格式</button>
            </div>
          </div>
          <div class="input-group" style="flex: 1;">
            <label for="edit-time">提醒时间</label>
            <input type="time" id="edit-time" />
          </div>
        </div>

        <!-- 目标次数 -->
        <div class="input-group" id="target-count-group" style="display: none; margin-bottom: 12px;">
          <label for="edit-target-count">目标次数 (不填为纯打卡)</label>
          <input type="number" id="edit-target-count" min="1" placeholder="留空则不设目标" style="width: 100%; box-sizing: border-box;" />
        </div>

        <!-- 编辑弹窗内的打卡补卡网格 -->
        <div class="input-group" id="edit-checkin-grid-group" style="display: none; margin-bottom: 12px;">
          <label id="edit-checkin-grid-label">打卡记录 (点击补卡/消卡)</label>
          <div id="edit-checkin-grid" style="margin-top: 4px;"></div>
        </div>

        <!-- 子任务区域 -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px; margin-bottom: 4px;">
          <label style="margin: 0; font-weight: 600;">子步骤/备注</label>
          <button type="button" id="copy-subtasks-btn" class="icon-btn-small copy-btn">复制内容</button>
        </div>
        <div class="subtasks-container" style="margin-top: 0; padding: 0; background: transparent;">
          <ul id="edit-subtasks-list" class="subtasks-list"></ul>
          <div class="add-subtask-row">
            <input type="text" id="add-subtask-input" placeholder="添加新子步骤..." autocomplete="off" />
            <button type="button" id="add-subtask-btn" class="icon-btn-small">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="16" height="16">
                <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="modal-delete-btn" class="modal-btn delete">删除</button>
        <div class="footer-right">
          <button id="modal-tomorrow-btn" class="modal-btn secondary">放到明天</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Import Modal -->
  <div id="import-modal" class="modal-overlay">
    <div class="modal-content glass-panel">
      <h3 id="import-modal-title">导入任务</h3>
      <div class="modal-body">
        <ul id="import-tasks-list" class="subtasks-list">
          <!-- Rendered via JS -->
        </ul>
      </div>
      <div class="modal-footer">
        <div class="footer-right" style="width: 100%; justify-content: flex-end;">
          <button id="import-cancel-btn" class="modal-btn secondary">取消</button>
          <button id="import-confirm-btn" class="modal-btn primary">导入选中项</button>
        </div>
      </div>
    </div>
  </div>
  <!-- Backup Modal -->
  <div id="backup-modal" class="modal-overlay">
    <div class="modal-content glass-panel" style="max-width: 400px;">
      <h3>选择要恢复的本地备份</h3>
      <div class="modal-body">
        <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 12px;">如果由于误操作同步导致数据丢失，可以从本地快照恢复。</p>
        <ul id="backup-list" class="subtasks-list" style="max-height: 200px; overflow-y: auto;">
          <!-- Rendered via JS -->
        </ul>
      </div>
      <div class="modal-footer">
        <div class="footer-right" style="width: 100%; justify-content: flex-end;">
          <button id="backup-close-btn" class="modal-btn secondary">关闭</button>
        </div>
      </div>
    </div>
  </div>
  <!-- Delete Confirm Modal -->
  <div id="delete-confirm-modal" class="modal-overlay" style="z-index: 3000;">
    <div class="modal-content delete-confirm-content">
      <div style="display: flex; align-items: center; gap: 10px;">
        <div style="display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; background: rgba(255, 77, 79, 0.15); color: #ff4d4f; flex-shrink: 0;">
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>
        <h3 style="margin: 0; font-size: 1.05rem; font-weight: 600; color: #ffffff;">确认删除</h3>
      </div>
      <div class="modal-body" style="padding: 0; gap: 0;">
        <p style="font-size: 0.88rem; color: rgba(255, 255, 255, 0.7); line-height: 1.5; margin: 0;">确定要彻底删除该待办事项吗？此操作无法撤销。</p>
      </div>
      <div class="modal-footer">
        <div class="footer-right" style="width: 100%; justify-content: flex-end; gap: 8px;">
          <button id="delete-cancel-btn" class="modal-btn secondary" style="margin: 0; padding: 8px 16px; border-radius: 8px; font-size: 0.82rem;">取消</button>
          <button id="delete-confirm-btn" class="modal-btn btn-danger-filled" style="margin: 0; padding: 8px 16px; border-radius: 8px; font-size: 0.82rem; font-weight: 600;">确认删除</button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Settings Modal -->
  <div id="settings-modal" class="modal-overlay">
    <div class="modal-content glass-panel" style="max-width: 450px;">
      <h3>设置</h3>
      <div class="modal-body">
        <div class="input-group">
          <label>同步模式</label>
          <select id="setting-sync-mode" class="custom-select">
            <option value="local">本地坚果云目录</option>
            <option value="webdav">坚果云 WebDAV (直连)</option>
          </select>
        </div>

        <div id="setting-local-group" class="input-group">
          <label>本地同步目录</label>
          <div style="display: flex; gap: 8px;">
            <input type="text" id="setting-sync-path" readonly placeholder="未选择" style="flex: 1;" />
            <button id="setting-choose-dir-btn" class="modal-btn secondary">选择</button>
          </div>
        </div>

        <div id="setting-webdav-group" style="display: none; border-top: 1px solid var(--border-color); padding-top: 10px; margin-top: 10px;">
          <div class="input-group">
            <label>WebDAV 服务器地址</label>
            <input type="text" id="setting-webdav-url" placeholder="https://dav.jianguoyun.com/dav/" />
          </div>
          <div class="input-group">
            <label>坚果云账号</label>
            <input type="text" id="setting-webdav-user" placeholder="您的邮箱" />
          </div>
          <div class="input-group">
            <label>应用密码</label>
            <input type="password" id="setting-webdav-pass" placeholder="坚果云第三方应用密码" />
          </div>
          <div class="input-group">
            <label>云端文件路径</label>
            <input type="text" id="setting-webdav-filepath" placeholder="我的坚果云/to-do/todo_data.json" />
          </div>
        </div>

        <div style="border-top: 1px solid var(--border-color); padding-top: 10px; margin-top: 10px;">
          <label>数据恢复</label>
          <button type="button" id="backup-btn" class="modal-btn secondary" style="width: 100%; margin-top: 8px;">从历史备份恢复</button>
        </div>

        <div style="border-top: 1px solid var(--border-color); padding-top: 10px; margin-top: 10px;">
          <label>软件更新</label>
          <button type="button" id="check-update-btn" class="modal-btn secondary" style="width: 100%; margin-top: 8px;">手动检查更新</button>
        </div>
      </div>
      <div class="modal-footer">
        <div class="footer-right" style="width: 100%; justify-content: flex-end;">
          <button id="settings-cancel-btn" class="modal-btn secondary">取消</button>
          <button id="settings-save-btn" class="modal-btn primary">保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Copy Options Modal -->
  <div id="copy-modal" class="modal-overlay" style="display: none; z-index: 2000;">
    <div class="modal-content glass-panel" style="max-width: 300px; padding: 20px;">
      <h4 style="margin-top: 0; margin-bottom: 16px; text-align: center;">选择复制格式</h4>
      <div style="display: flex; flex-direction: column; gap: 10px;">
        <button id="copy-opt-1" class="modal-btn primary" style="width: 100%;">纯文本</button>
        <button id="copy-opt-2" class="modal-btn primary" style="width: 100%;">无序列表 (-)</button>
        <button id="copy-opt-3" class="modal-btn primary" style="width: 100%;">有序列表 (1.)</button>
        <button id="copy-opt-cancel" class="modal-btn secondary" style="width: 100%; margin-top: 8px;">取消</button>
      </div>
    </div>
  </div>

  <!-- 闪电录入（聚光灯模式）遮罩层 -->
  <div class="modal-overlay" id="quick-add-modal">
    <div style="width: 80%; max-width: 600px;">
      <input type="text" id="quick-add-input" placeholder="输入待办事项，按回车闪电保存..." 
        style="width: 100%; padding: 20px 30px; font-size: 24px; border: none; border-radius: 16px; background: rgba(255,255,255,0.1); color: #fff; outline: none; box-shadow: 0 10px 30px rgba(0,0,0,0.3); backdrop-filter: blur(20px);" />
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
