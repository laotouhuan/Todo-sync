<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do Sync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="glass-panel" id="app-panel">
    <!-- Header -->
    <header data-tauri-drag-region>
      <div class="header-left" data-tauri-drag-region>
        <span class="app-title" data-tauri-drag-region>To-Do Sync</span>
        <div class="status-indicator" id="sync-status"></div>
      </div>
      <div class="header-right">
        <button id="manual-sync-btn" class="icon-btn" title="云同步">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
            <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" fill="currentColor"/>
          </svg>
        </button>
        <button id="stats-btn" class="icon-btn" title="任务回顾">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
            <path d="M3 3V21H21V19H5V3H3ZM7 17H10V10H7V17ZM12 17H15V6H12V17ZM17 17H20V13H17V17Z" fill="currentColor"/>
          </svg>
        </button>
        <button id="pin-btn" class="icon-btn" title="固定置顶">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
            <path d="M16 12V4H17V2H7V4H8V12L6 14V16H11.2V22H12.8V16H18V14L16 12Z" fill="currentColor"/>
          </svg>
        </button>
        <button id="settings-btn" class="icon-btn" title="设置同步目录">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
            <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22l-1.92 3.32c-.12.21-.07.47.12.61l2.03 1.58c-.05.3-.09.62-.09.94s.04.64.09.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .43-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.03-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" fill="currentColor"/>
          </svg>
        </button>
        <button id="backup-btn" class="icon-btn" title="历史备份恢复">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
            <path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z" fill="currentColor"/>
          </svg>
        </button>
        <button id="view-toggle-btn" class="icon-btn" title="切换视图">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="18" height="18">
            <path d="M4 4H10V10H4V4ZM14 4H20V10H14V4ZM4 14H10V20H4V14ZM14 14H20V20H14V14Z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Date Filter tabs -->
    <div class="tabs-container">
      <button class="tab-btn active" id="tab-today">今天聚焦</button>
      <button class="tab-btn" id="tab-all">全部待办</button>
    </div>



    <!-- Todo List & Matrix -->
    <main id="main-content" class="list-view">
      <ul id="todo-list">
        <!-- Rendered via JS -->
      </ul>
      <div id="matrix-container">
        <div class="quadrant quadrant-1">
          <div class="quadrant-header">重要 且 紧急</div>
          <ul class="quadrant-list" id="quadrant-list-1"></ul>
        </div>
        <div class="quadrant quadrant-2">
          <div class="quadrant-header">重要 不紧急</div>
          <ul class="quadrant-list" id="quadrant-list-2"></ul>
        </div>
        <div class="quadrant quadrant-3">
          <div class="quadrant-header">紧急 不重要</div>
          <ul class="quadrant-list" id="quadrant-list-3"></ul>
        </div>
        <div class="quadrant quadrant-4">
          <div class="quadrant-header">不重要 不紧急</div>
          <ul class="quadrant-list" id="quadrant-list-4"></ul>
        </div>
      </div>
    </main>

    <!-- Stats Container -->
    <div id="stats-container" class="hidden">
      <div class="stats-header">
        <div class="tabs-container stats-period-tabs">
          <button class="tab-btn active" id="stats-period-day">日</button>
          <button class="tab-btn" id="stats-period-week">周</button>
          <button class="tab-btn" id="stats-period-month">月</button>
        </div>
        <div class="stats-date-nav">
          <button id="stats-prev-btn" class="icon-btn-small">
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <span id="stats-date-label">2026年 第22周</span>
          <button id="stats-next-btn" class="icon-btn-small">
            <svg viewBox="0 0 24 24" fill="none" width="16" height="16"><path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <div class="stats-filter-container">
          <button class="pill-btn stats-filter-btn active" data-filter="all">全部</button>
          <button class="pill-btn stats-filter-btn" data-filter="completed">已完成</button>
          <button class="pill-btn stats-filter-btn" data-filter="uncompleted">未完成</button>
        </div>
      </div>
      <div class="stats-summary-bar">
        <div class="stats-summary-text" id="stats-summary-text">共 0 项任务，已完成 0 项，进度 0%</div>
        <div class="stats-progress-track">
          <div class="stats-progress-fill" id="stats-progress-fill" style="width: 0%;"></div>
        </div>
      </div>
      <ul id="stats-list"></ul>
    </div>

    <!-- Add Input -->
    <footer id="app-footer">
      <form id="add-form">
        <input type="text" id="todo-input" placeholder="添加新待办..." autocomplete="off" />
        <button type="submit" class="add-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </form>
    </footer>
  </div>

  <!-- Edit Modal -->
  <div id="edit-modal" class="modal-overlay">
    <div class="modal-content glass-panel">
      <h3>编辑待办</h3>
      <div class="modal-body">
        <label for="edit-content">待办内容</label>
        <input type="text" id="edit-content" placeholder="输入待办内容..." autocomplete="off" />
        
        <div class="rating-group">
          <div class="rating-label">重要性</div>
          <div class="rating-options" id="edit-importance-options">
            <button type="button" class="rate-btn" data-value="1">低</button>
            <button type="button" class="rate-btn" data-value="2">中</button>
            <button type="button" class="rate-btn" data-value="3">高</button>
          </div>
        </div>

        <div class="rating-group">
          <div class="rating-label">紧急性</div>
          <div class="rating-options" id="edit-urgency-options">
            <button type="button" class="rate-btn" data-value="1">低</button>
            <button type="button" class="rate-btn" data-value="2">中</button>
            <button type="button" class="rate-btn" data-value="3">高</button>
          </div>
        </div>

        <!-- 日期与时间选择器 -->
        <div class="date-time-row">
          <div class="input-group">
            <label for="edit-date">截止日期</label>
            <input type="date" id="edit-date" />
          </div>
          <div class="input-group">
            <label for="edit-time">提醒时间</label>
            <input type="time" id="edit-time" />
          </div>
        </div>

        <!-- 循环规则 -->
        <div class="input-group">
          <label for="edit-recurring">重复规则</label>
          <select id="edit-recurring" class="custom-select">
            <option value="none">不重复</option>
            <option value="daily">每天</option>
            <option value="weekly">每周</option>
            <option value="monthly">每月</option>
          </select>
        </div>

        <!-- 子任务区域 -->
        <div class="subtasks-container">
          <label>子步骤拆解</label>
          <ul id="edit-subtasks-list" class="subtasks-list"></ul>
          <div class="add-subtask-row">
            <input type="text" id="add-subtask-input" placeholder="添加新子步骤..." autocomplete="off" />
            <button type="button" id="add-subtask-btn" class="icon-btn-small">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="16" height="16">
                <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="modal-delete-btn" class="modal-btn delete">删除</button>
        <div class="footer-right">
          <button id="modal-cancel-btn" class="modal-btn secondary">取消</button>
          <button id="modal-save-btn" class="modal-btn primary">确定</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Import Modal -->
  <div id="import-modal" class="modal-overlay">
    <div class="modal-content glass-panel">
      <h3 id="import-modal-title">导入任务</h3>
      <div class="modal-body">
        <ul id="import-tasks-list" class="subtasks-list">
          <!-- Rendered via JS -->
        </ul>
      </div>
      <div class="modal-footer">
        <div class="footer-right" style="width: 100%; justify-content: flex-end;">
          <button id="import-cancel-btn" class="modal-btn secondary">取消</button>
          <button id="import-confirm-btn" class="modal-btn primary">导入选中项</button>
        </div>
      </div>
    </div>
  </div>
  <!-- Backup Modal -->
  <div id="backup-modal" class="modal-overlay">
    <div class="modal-content glass-panel" style="max-width: 400px;">
      <h3>选择要恢复的本地备份</h3>
      <div class="modal-body">
        <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 12px;">如果由于误操作同步导致数据丢失，可以从本地快照恢复。</p>
        <ul id="backup-list" class="subtasks-list" style="max-height: 200px; overflow-y: auto;">
          <!-- Rendered via JS -->
        </ul>
      </div>
      <div class="modal-footer">
        <div class="footer-right" style="width: 100%; justify-content: flex-end;">
          <button id="backup-close-btn" class="modal-btn secondary">关闭</button>
        </div>
      </div>
    </div>
  </div>
  <!-- Settings Modal -->
  <div id="settings-modal" class="modal-overlay">
    <div class="modal-content glass-panel" style="max-width: 450px;">
      <h3>同步设置</h3>
      <div class="modal-body">
        <div class="input-group">
          <label>同步模式</label>
          <select id="setting-sync-mode" class="custom-select">
            <option value="local">本地坚果云目录</option>
            <option value="webdav">坚果云 WebDAV (直连)</option>
          </select>
        </div>

        <div id="setting-local-group" class="input-group">
          <label>本地同步目录</label>
          <div style="display: flex; gap: 8px;">
            <input type="text" id="setting-sync-path" readonly placeholder="未选择" style="flex: 1;" />
            <button id="setting-choose-dir-btn" class="modal-btn secondary">选择</button>
          </div>
        </div>

        <div id="setting-webdav-group" style="display: none; border-top: 1px solid var(--border-color); padding-top: 10px; margin-top: 10px;">
          <div class="input-group">
            <label>WebDAV 服务器地址</label>
            <input type="text" id="setting-webdav-url" placeholder="https://dav.jianguoyun.com/dav/" />
          </div>
          <div class="input-group">
            <label>坚果云账号</label>
            <input type="text" id="setting-webdav-user" placeholder="您的邮箱" />
          </div>
          <div class="input-group">
            <label>应用密码</label>
            <input type="password" id="setting-webdav-pass" placeholder="坚果云第三方应用密码" />
          </div>
          <div class="input-group">
            <label>云端文件路径</label>
            <input type="text" id="setting-webdav-filepath" placeholder="我的坚果云/to-do/todo_data.json" />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <div class="footer-right" style="width: 100%; justify-content: flex-end;">
          <button id="settings-cancel-btn" class="modal-btn secondary">取消</button>
          <button id="settings-save-btn" class="modal-btn primary">保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 闪电录入（聚光灯模式）遮罩层 -->
  <div class="modal-overlay" id="quick-add-modal">
    <div style="width: 80%; max-width: 600px;">
      <input type="text" id="quick-add-input" placeholder="输入待办事项，按回车闪电保存..." 
        style="width: 100%; padding: 20px 30px; font-size: 24px; border: none; border-radius: 16px; background: rgba(255,255,255,0.1); color: #fff; outline: none; box-shadow: 0 10px 30px rgba(0,0,0,0.3); backdrop-filter: blur(20px);" />
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
