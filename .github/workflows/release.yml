name: 'Publish Desktop Release'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Frontend Dependencies
        run: |
          cd windows
          npm install

      # 注意：当前构建产物为未代码签名的安装包（Code Signing Certificate 需付费获取）。
      # 用户首次安装时 Windows SmartScreen 可能弹出警告，点击「仍要运行」即可正常安装。
      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: "./windows"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Extract Version from Tauri Config
        id: get_version
        shell: bash
        run: |
          VERSION=$(node -p "require('./windows/src-tauri/tauri.conf.json').version")
          echo "tag_name=v$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename Windows Setup for Release
        shell: bash
        run: |
          mv -f windows/src-tauri/target/release/bundle/nsis/Todo_${{ steps.get_version.outputs.version }}_x64-setup.exe windows/src-tauri/target/release/bundle/nsis/Todo-${{ steps.get_version.outputs.version }}-windows-x64-setup.exe
          if [ -f "windows/src-tauri/target/release/bundle/nsis/Todo_${{ steps.get_version.outputs.version }}_x64-setup.exe.sig" ]; then
            mv -f windows/src-tauri/target/release/bundle/nsis/Todo_${{ steps.get_version.outputs.version }}_x64-setup.exe.sig windows/src-tauri/target/release/bundle/nsis/Todo-${{ steps.get_version.outputs.version }}-windows-x64-setup.exe.sig
          fi
          if [ -f "windows/src-tauri/target/release/bundle/nsis/Todo_${{ steps.get_version.outputs.version }}_x64-setup.nsis.zip" ]; then
            mv -f windows/src-tauri/target/release/bundle/nsis/Todo_${{ steps.get_version.outputs.version }}_x64-setup.nsis.zip windows/src-tauri/target/release/bundle/nsis/Todo-${{ steps.get_version.outputs.version }}-windows-x64-setup.nsis.zip
            mv -f windows/src-tauri/target/release/bundle/nsis/Todo_${{ steps.get_version.outputs.version }}_x64-setup.nsis.zip.sig windows/src-tauri/target/release/bundle/nsis/Todo-${{ steps.get_version.outputs.version }}-windows-x64-setup.nsis.zip.sig
          fi

      - name: Generate latest.json
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const version = require('./windows/src-tauri/tauri.conf.json').version;
            
            let signature = '';
            let updateUrl = 'https://github.com/laotouhuan/Todo-sync/releases/download/v' + version + '/Todo-' + version + '-windows-x64-setup.exe';
            
            const exeSigPath = 'windows/src-tauri/target/release/bundle/nsis/Todo-' + version + '-windows-x64-setup.exe.sig';
            const zipSigPath = 'windows/src-tauri/target/release/bundle/nsis/Todo-' + version + '-windows-x64-setup.nsis.zip.sig';
            
            if (fs.existsSync(zipSigPath)) {
              signature = fs.readFileSync(zipSigPath, 'utf8').trim();
              updateUrl = 'https://github.com/laotouhuan/Todo-sync/releases/download/v' + version + '/Todo-' + version + '-windows-x64-setup.nsis.zip';
            } else if (fs.existsSync(exeSigPath)) {
              signature = fs.readFileSync(exeSigPath, 'utf8').trim();
            }
            
            const data = {
              version: version,
              notes: 'Todo-sync v' + version + ' Release',
              pub_date: new Date().toISOString(),
              platforms: {
                'android-arm64': {
                  url: 'https://github.com/laotouhuan/Todo-sync/releases/download/v' + version + '/Todo-' + version + '-android.apk'
                },
                'windows-x86_64': {
                  signature: signature,
                  url: updateUrl
                }
              }
            };
            fs.writeFileSync('latest.json', JSON.stringify(data, null, 2));
          "

      - name: Create Release and Upload Windows Setup
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag_name }}
          name: 'Todo-sync ${{ steps.get_version.outputs.tag_name }}'
          body: 'Todo-sync ${{ steps.get_version.outputs.tag_name }} Release.'
          draft: false
          # workflow_dispatch 手动触发时若 tag 不存在则自动创建
          make_latest: 'true'
          files: |
            windows/src-tauri/target/release/bundle/nsis/Todo-${{ steps.get_version.outputs.version }}-windows-x64-setup*
            latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-android:
    needs: publish-tauri
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Android Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Extract Version from Tauri Config
        id: get_version
        run: |
          VERSION=$(node -p "require('./windows/src-tauri/tauri.conf.json').version")
          echo "tag_name=v$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK for Release
        run: |
          mv -f android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/Todo-${{ steps.get_version.outputs.version }}-android.apk

      - name: Upload APK to Github Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag_name }}
          files: android/app/build/outputs/apk/debug/Todo-${{ steps.get_version.outputs.version }}-android.apk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

